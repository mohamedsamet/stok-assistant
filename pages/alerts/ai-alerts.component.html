<div class="card border-0 shadow-sm mb-4">
  <div class="card-body d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
    <div>
      <h4 class="mb-1">Inventory Alerts</h4>
      <p class="text-muted mb-0">Monitor stockout risk, overstock situations, and unusual inventory behavior.</p>
    </div>
    <div class="badge text-bg-light border px-3 py-2">
      {{ alerts.length }} active alerts
    </div>
  </div>
</div>

<div *ngIf="isLoading" class="d-flex justify-content-center py-5">
  <div class="spinner-border text-dark" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div *ngIf="!isLoading && alerts.length === 0" class="alert alert-light border">
  No alerts detected at the moment.
</div>

<div *ngIf="!isLoading && alerts.length > 0">
  <app-alert-list [alerts]="alerts"></app-alert-list>
</div>
