<div class="card border-0 shadow-sm mb-4">
  <div class="card-body d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
    <div>
      <h4 class="mb-1">Inventory Recommendations</h4>
      <p class="text-muted mb-0">Prioritized actions generated from stock levels, sales activity, and anomaly detection.</p>
    </div>
    <div class="badge text-bg-light border px-3 py-2">
      {{ recommendations.length }} actions available
    </div>
  </div>
</div>

<div *ngIf="isLoading" class="d-flex justify-content-center py-5">
  <div class="spinner-border text-dark" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div *ngIf="!isLoading && recommendations.length === 0" class="alert alert-light border">
  No recommendations available right now.
</div>

<div *ngIf="!isLoading && recommendations.length > 0" class="d-flex flex-column gap-3">
  <app-recommendation-card
    *ngFor="let recommendation of recommendations"
    [recommendation]="recommendation">
  </app-recommendation-card>
</div>
