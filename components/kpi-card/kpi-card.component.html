<div class="card border-0 shadow-sm h-100 ai-card ai-kpi-card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start gap-3">
      <div>
        <p class="text-muted small text-uppercase fw-semibold mb-2">{{ kpi.label }}</p>
        <h3 class="mb-1 fw-bold">{{ kpi.value }}</h3>
        <p class="mb-0 text-muted small">{{ kpi.description }}</p>
      </div>
      <div class="ai-icon-pill">
        <i [class]="kpi.icon"></i>
      </div>
    </div>

    <div class="mt-3 d-flex align-items-center gap-2">
      <span class="small fw-semibold" [ngClass]="getTrendClass()">
        <i [class]="getTrendIcon()"></i>
        {{ kpi.trend?.value ?? 0 }}%
      </span>
      <span class="text-muted small">vs {{ kpi.trend?.label || 'période précédente' }}</span>
    </div>
  </div>
</div>
