<div class="card border-0 shadow-sm mb-4">
  <div class="card-body d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
    <div>
      <h4 class="mb-1">Demand Forecasts</h4>
      <p class="text-muted mb-0">Projected demand and confidence levels to support replenishment planning.</p>
    </div>
    <div class="badge text-bg-light border px-3 py-2">
      {{ forecasts.length }} forecast entries
    </div>
  </div>
</div>

<div *ngIf="isLoading" class="d-flex justify-content-center py-5">
  <div class="spinner-border text-dark" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div *ngIf="!isLoading && forecasts.length === 0" class="alert alert-light border">
  No forecast data available right now.
</div>

<div *ngIf="!isLoading && forecasts.length > 0">
  <app-forecast-table [forecasts]="forecasts"></app-forecast-table>
</div>
